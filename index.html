<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的作品集</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
      position: sticky;
      top: 0;
    }

    nav a {
      margin: 0 15px;
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h1, h2 {
      margin-bottom: 20px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      background: #38bdf8;
      color: #000;
      border-radius: 8px;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1e293b;
    }
  </style>
</head>
<body>

<header>
  <h1>我的作品集</h1>
  <nav>
    <a href="#about">關於我</a>
    <a href="#projects">作品</a>
    <a href="#contact">聯絡</a>
  </nav>
</header>

<section id="about">
  <h2>關於我</h2>
  <p>我是XXX，擅長遊戲設計、網頁開發與互動設計。</p>
</section>

<section id="projects">
  <h2>作品集</h2>
  <div class="projects">

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>校園逃生遊戲</h3>
      <p>Unity 2D 遊戲，結合解謎與劇情。</p>
      <a class="btn" href="#">查看作品</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>無障礙地圖網站</h3>
      <p>提供無障礙設施查詢的網頁系統。</p>
      <a class="btn" href="#">查看作品</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>任務管理系統</h3>
      <p>支援新增、修改與刪除任務。</p>
      <a class="btn" href="#">查看作品</a>
    </div>

  </div>
</section>

<section id="contact">
  <h2>聯絡我</h2>
  <p>Email：your@email.com</p>
</section>

<footer>
  <p>© 2026 我的作品集</p>
</footer>

</body>
</html>
